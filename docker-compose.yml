name: matflote

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DinnerPlanner: Data Source=/data/dinnerplanner.db
      ImageStorage__RootPath: /data/images
      ShoppingListExport__Provider: ${SHOPPING_LIST_EXPORT_PROVIDER:-Vikunja}
      ShoppingListExport__TaskMode: ${SHOPPING_LIST_EXPORT_TASK_MODE:-SingleTask}
      Vikunja__BaseUrl: ${VIKUNJA_BASE_URL:-}
      Vikunja__ApiToken: ${VIKUNJA_API_TOKEN:-}
      Vikunja__ProjectId: ${VIKUNJA_PROJECT_ID:-}
      Kassalapp__ApiKey: ${KASSALAPP_API_KEY:-}
      Helsedirektoratet__BaseUrl: ${HELSEDIREKTORATET_BASE_URL:-https://api.helsedirektoratet.no}
      Helsedirektoratet__SubscriptionKey: ${HELSEDIREKTORATET_SUBSCRIPTION_KEY:-}
    volumes:
      - matflote-data:/data
      - matflote-images:/data/images
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${MATFLOTE_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  matflote-data:
    name: matflote-data
  matflote-images:
    name: matflote-images
